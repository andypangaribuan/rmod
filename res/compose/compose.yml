networks:
  rmod:


x-general: &general
  restart: always
  networks:
    - rmod
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: 3


services:
  rmod-pg:
    container_name: rmod-pg
    image: postgres:18.1-alpine3.23
    <<: *general
    ports:
      - 15432:5432
    volumes:
      - ./vol:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_DB      : ${PG_DB}
      POSTGRES_USER    : ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
    healthcheck:
      test    : ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout : 5s
      retries : 5
